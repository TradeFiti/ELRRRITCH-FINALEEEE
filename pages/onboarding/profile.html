<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eltrich Prime — Profile Setup</title>
  <link rel="stylesheet" href="../../system/tokens.css">
  <link rel="stylesheet" href="../../system/components.css">
  <link rel="stylesheet" href="../../system/layout.css">
  <style>
    .onboarding-wrapper {
      display: flex;
      flex-direction: column;
      min-height: 900px;
    }
    .onboarding-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 24px 32px;
    }
    .onboarding-form {
      width: 100%;
      max-width: 540px;
    }
    .onboarding-heading {
      font-family: var(--font-serif);
      font-size: var(--text-3xl);
      font-weight: 600;
      color: var(--text-primary);
      text-align: center;
      line-height: 1.2;
    }
    .onboarding-subtitle {
      font-size: var(--text-base);
      color: var(--text-secondary);
      text-align: center;
      margin-top: 8px;
      margin-bottom: 36px;
    }
    .avatar-upload {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: var(--bg-secondary);
      border: 2px dashed var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 0 auto 32px;
      cursor: pointer;
      transition: all var(--transition-fast);
      position: relative;
      overflow: hidden;
    }
    .avatar-upload:hover {
      border-color: var(--accent);
      background: var(--accent-light);
    }
    .avatar-upload-icon {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--accent-light);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 4px;
    }
    .avatar-upload-text {
      font-size: 10px;
      font-weight: 500;
      color: var(--text-muted);
    }
    .phone-input-row {
      display: flex;
      gap: 8px;
    }
    .phone-code-select {
      width: 100px;
      flex-shrink: 0;
    }
    .onboarding-footer {
      width: 100%;
      max-width: 540px;
      margin-top: auto;
      padding-top: 24px;
    }
    .skip-link {
      display: block;
      text-align: center;
      margin-top: 16px;
      font-size: var(--text-sm);
      color: var(--text-muted);
      font-weight: 500;
      cursor: pointer;
      transition: color var(--transition-fast);
    }
    .skip-link:hover { color: var(--text-secondary); }

    /* Mobile overrides */
    .mobile .onboarding-heading { font-size: var(--text-xl); }
    .mobile .onboarding-subtitle { font-size: var(--text-sm); margin-bottom: 24px; }
    .mobile .onboarding-body { padding: 24px 16px 16px; }
    .mobile .avatar-upload { width: 80px; height: 80px; margin-bottom: 24px; }
    .mobile .stepper { padding: 12px 8px; }
  </style>
</head>
<body>
<a href="../../index.html" style="position:fixed;bottom:24px;left:24px;z-index:9999;display:flex;align-items:center;gap:8px;padding:10px 20px;background:var(--bg-card,#fff);border:1px solid var(--border,#e5e5e5);border-radius:999px;text-decoration:none;box-shadow:0 4px 16px rgba(0,0,0,0.1);transition:all 0.2s;font-family:'Inter',system-ui,sans-serif;font-size:13px;font-weight:600;color:#d4952a;" onmouseover="this.style.borderColor='#d4952a';this.style.boxShadow='0 6px 24px rgba(212,149,42,0.2)';this.style.transform='translateY(-2px)'" onmouseout="this.style.borderColor='';this.style.boxShadow='0 4px 16px rgba(0,0,0,0.1)';this.style.transform=''">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#d4952a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
  All Screens
</a>


<div class="dual-panel">

  <!-- ==================== DESKTOP VIEW ==================== -->
  <div class="panel-desktop">
    <div class="panel-label">Desktop View</div>
    <div class="panel-desktop-inner">
      <div class="onboarding-wrapper">

        <!-- Top Bar -->
        <div class="top-bar">
          <div class="top-bar-logo">Eltrich Prime</div>
        </div>

        <!-- Progress Stepper -->
        <div class="stepper">
          <div class="stepper-step stepper-step--active">1</div>
          <div class="stepper-line"></div>
          <div class="stepper-step">2</div>
          <div class="stepper-line"></div>
          <div class="stepper-step">3</div>
          <div class="stepper-line"></div>
          <div class="stepper-step">4</div>
        </div>

        <!-- Body -->
        <div class="onboarding-body">
          <div class="onboarding-form">

            <div class="onboarding-heading">Set Up Your Profile</div>
            <div class="onboarding-subtitle">Tell us a bit about yourself</div>

            <!-- Avatar Upload -->
            <div class="avatar-upload">
              <div class="avatar-upload-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/>
                  <circle cx="12" cy="13" r="4"/>
                </svg>
              </div>
              <div class="avatar-upload-text">Upload Photo</div>
            </div>

            <!-- First Name -->
            <div class="input-group">
              <label class="input-label">First Name</label>
              <input type="text" class="input" value="Bileonaire" placeholder="Enter your first name">
            </div>

            <!-- Last Name -->
            <div class="input-group">
              <label class="input-label">Last Name</label>
              <input type="text" class="input" placeholder="Enter your last name">
            </div>

            <!-- Phone Number -->
            <div class="input-group">
              <label class="input-label">Phone Number</label>
              <div class="phone-input-row">
                <select class="select phone-code-select">
                  <option value="+254" selected>+254</option>
                  <option value="+1">+1</option>
                  <option value="+44">+44</option>
                  <option value="+971">+971</option>
                  <option value="+27">+27</option>
                  <option value="+234">+234</option>
                  <option value="+255">+255</option>
                  <option value="+256">+256</option>
                </select>
                <input type="tel" class="input" placeholder="712 345 678">
              </div>
            </div>

            <!-- Footer Actions -->
            <div class="onboarding-footer">
              <button class="btn btn-primary btn-lg w-full" onclick="window.location.href='kyc.html'">Continue</button>
              <a class="skip-link" href="kyc.html">Skip for now</a>
            </div>

          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- ==================== MOBILE VIEW ==================== -->
  <div class="panel-mobile">
    <div class="panel-label" style="text-align:center;">Mobile View</div>
    <div class="phone-frame">
      <div class="phone-notch"></div>
      <div class="phone-screen">
        <div class="mobile onboarding-wrapper" style="min-height:auto;">

          <!-- Top Bar -->
          <div class="top-bar" style="padding:14px 16px;">
            <div class="top-bar-logo" style="font-size:var(--text-lg);">Eltrich Prime</div>
          </div>

          <!-- Progress Stepper -->
          <div class="stepper" style="padding:12px 8px;">
            <div class="stepper-step stepper-step--active" style="width:26px;height:26px;font-size:11px;">1</div>
            <div class="stepper-line" style="width:28px;"></div>
            <div class="stepper-step" style="width:26px;height:26px;font-size:11px;">2</div>
            <div class="stepper-line" style="width:28px;"></div>
            <div class="stepper-step" style="width:26px;height:26px;font-size:11px;">3</div>
            <div class="stepper-line" style="width:28px;"></div>
            <div class="stepper-step" style="width:26px;height:26px;font-size:11px;">4</div>
          </div>

          <!-- Body -->
          <div style="padding:20px 16px 24px;">

            <div style="font-family:var(--font-serif);font-size:var(--text-xl);font-weight:600;color:var(--text-primary);text-align:center;line-height:1.2;">Set Up Your Profile</div>
            <div style="font-size:var(--text-sm);color:var(--text-secondary);text-align:center;margin-top:6px;margin-bottom:24px;">Tell us a bit about yourself</div>

            <!-- Avatar Upload -->
            <div class="avatar-upload" style="width:80px;height:80px;margin-bottom:24px;">
              <div class="avatar-upload-icon" style="width:30px;height:30px;">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/>
                  <circle cx="12" cy="13" r="4"/>
                </svg>
              </div>
              <div class="avatar-upload-text" style="font-size:9px;">Upload Photo</div>
            </div>

            <!-- First Name -->
            <div class="input-group">
              <label class="input-label">First Name</label>
              <input type="text" class="input" value="Bileonaire" placeholder="Enter your first name">
            </div>

            <!-- Last Name -->
            <div class="input-group">
              <label class="input-label">Last Name</label>
              <input type="text" class="input" placeholder="Enter your last name">
            </div>

            <!-- Phone Number -->
            <div class="input-group">
              <label class="input-label">Phone Number</label>
              <div class="phone-input-row">
                <select class="select phone-code-select">
                  <option value="+254" selected>+254</option>
                  <option value="+1">+1</option>
                  <option value="+44">+44</option>
                  <option value="+971">+971</option>
                </select>
                <input type="tel" class="input" placeholder="712 345 678">
              </div>
            </div>

            <!-- Footer -->
            <div style="margin-top:24px;">
              <button class="btn btn-primary btn-lg w-full" onclick="window.location.href='kyc.html'">Continue</button>
              <a class="skip-link" href="kyc.html">Skip for now</a>
            </div>

          </div>
        </div>
      </div>
      <div class="phone-home-indicator"></div>
    </div>
  </div>

</div>


<!-- All Screens Card -->
<div style="max-width:580px;margin:40px auto;padding:0 24px;">
  <a href="../../index.html" style="display:flex;align-items:center;gap:16px;padding:20px 24px;background:var(--bg-card,#fff);border:1px solid var(--border,#e5e5e5);border-radius:16px;text-decoration:none;box-shadow:0 2px 12px rgba(0,0,0,0.06);transition:all 0.2s;" onmouseover="this.style.borderColor='#d4952a';this.style.boxShadow='0 6px 24px rgba(212,149,42,0.12)';this.style.transform='translateY(-2px)'" onmouseout="this.style.borderColor='#e5e5e5';this.style.boxShadow='0 2px 12px rgba(0,0,0,0.06)';this.style.transform=''">
    <div style="width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,#fdf4e6,#faf0d8);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#d4952a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
    </div>
    <div style="flex:1;">
      <div style="font-family:'Playfair Display',Georgia,serif;font-size:16px;font-weight:600;color:#1a1a1a;">All Screens</div>
      <div style="font-size:12px;color:#9c9590;margin-top:2px;">Browse all 64 screens in the Eltrich Prime prototype</div>
    </div>
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#d4952a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
  </a>
</div>
</body>
</html>
